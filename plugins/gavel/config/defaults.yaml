tools:
  # Simple entries (allow)
  cd: "allow"
  mkdir: "allow"
  touch: "allow"
  ls: "allow"
  cat: "allow"
  head: "allow"
  tail: "allow"
  wc: "allow"
  sort: "allow"
  uniq: "allow"
  cut: "allow"
  grep: "allow"
  rg: "allow"
  sed: "allow"
  awk: "allow"
  jq: "allow"
  yq: "allow"
  echo: "allow"
  printf: "allow"
  date: "allow"
  basename: "allow"
  dirname: "allow"
  realpath: "allow"
  stat: "allow"
  file: "allow"
  which: "allow"
  type: "allow"
  whoami: "allow"
  uname: "allow"
  hostname: "allow"
  pwd: "allow"
  tree: "allow"
  du: "allow"
  df: "allow"
  make: "allow"
  cargo: "allow"
  gcc: "allow"
  go: "allow"
  rustc: "allow"
  diff: "allow"
  tr: "allow"
  tac: "allow"
  rev: "allow"
  test: "allow"
  "true": "allow"
  "false": "allow"
  readlink: "allow"
  shasum: "allow"
  printenv: "allow"
  seq: "allow"
  comm: "allow"
  paste: "allow"

  # Simple entries (ask)
  curl: "ask"
  wget: "ask"
  ssh: "ask"
  scp: "ask"
  rsync: "ask"
  nc: "ask"
  rm: "ask"
  rmdir: "ask"
  mv: "ask"
  cp: "allow"
  find:
    dangerous_flags: ["-exec", "-execdir", "-ok", "-okdir", "-delete", "-fprint", "-fls", "-fprintf"]
    default: "allow"
  chmod: "ask"
  chown: "ask"
  pip: "ask"
  pip3: "ask"

  # Rule entries (map)
  git:
    ask: ["push", "clean", "filter-branch", "rebase", "reset"]
    dangerous_flags: ["--force", "-f", "--hard", "-D", "--no-verify"]
    default: "allow"

  docker:
    ask: ["rm", "kill", "exec", "run", "build", "push", "system prune"]
    dangerous_flags: ["--force", "-f"]
    default: "ask"

  gh:
    allow:
      # PR (read-only)
      - "pr view"
      - "pr list"
      - "pr status"
      - "pr diff"
      - "pr checks"
      - "pr checkout"
      # Issue (read-only)
      - "issue view"
      - "issue list"
      - "issue status"
      # Repo (read-only)
      - "repo view"
      - "repo list"
      - "repo clone"
      # Release (read-only)
      - "release view"
      - "release list"
      # Actions (read-only)
      - "run view"
      - "run list"
      - "workflow view"
      - "workflow list"
      # Other (read-only)
      - "api"
      - "search"
      - "status"
    dangerous_flags: ["-X", "--method"]
    default: "ask"

  npm:
    ask: ["install", "publish", "uninstall"]
    dangerous_flags: ["--force"]
    default: "ask"

pipe_deny_right:
  - "bash"
  - "sh"
  - "zsh"
  - "ksh"
  - "fish"
  - "csh"
  - "tcsh"
  - "python"
  - "python3"
  - "perl"
  - "ruby"
  - "node"
  - "eval"
  - "exec"
  - "xargs"

allowed_dirs_extra: []
audit_log_path: "~/.claude/gavel-audit.jsonl"
# Phase policy: override the decision for each dangerous_node phase.
# Keys correspond to the part after the colon in dangerous_node IDs
# (e.g., "P4:var_expansion" → key is "var_expansion").
# Valid values: "deny", "ask", "allow"
# Default values below match the original hardcoded behavior.
phase_policy:
  background_execution: "ask"
  backtick_substitution: "ask"
  cmd_substitution: "ask"
  var_expansion: "ask"
  env_assignment: "ask"
  glob_chars: "ask"
