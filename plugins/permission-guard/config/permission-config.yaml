interpreters:
  python3:
    safe_flags:
      - u
      - B
      - s
      - S
      - v
      - b
      - q
      - O
      - I
      - E
      - P
      - R
    dangerous_flags:
      - c
      - e
      - m
    dangerous_long_flags:
      - --command
      - --eval
  bash:
    safe_flags:
      - n
      - x
      - e
      - u
      - v
      - E
      - f
      - r
    dangerous_flags:
      - c
      - i
    dangerous_long_flags:
      - --init-file
      - --rcfile
  sh:
    safe_flags:
      - x
      - e
      - u
      - v
      - E
      - f
      - r
    dangerous_flags:
      - c
      - i
    dangerous_long_flags:
      - --init-file
      - --rcfile
  node:
    safe_flags:
      - v
    dangerous_flags:
      - e
      - p
    dangerous_long_flags:
      - --eval
      - --print
      - --require
      - --input-type
  perl:
    safe_flags:
      - w
      - T
      - c
      - v
    dangerous_flags:
      - e
      - E
    dangerous_long_flags: []
  ruby:
    safe_flags:
      - w
      - d
      - v
    dangerous_flags:
      - e
    dangerous_long_flags:
      - --eval
  php:
    safe_flags:
      - v
      - i
      - m
    dangerous_flags:
      - r
    dangerous_long_flags:
      - --run

interpreters_extra: {}

always_ask:
  - curl
  - wget
  - ssh
  - scp
  - rsync
  - nc
  - sudo
  - su
  - eval
  - exec
  - xargs
  - env
  - nohup
  - busybox
  - screen
  - tmux
  - script
  - pip
  - pip3
  - apt
  - apt-get
  - rm
  - rmdir
  - mv
  - cp
  # F-003: python interpreters
  - python
  - python2
  # F-004: shell interpreter variants
  - dash
  - zsh
  - ksh
  - fish
  - csh
  - tcsh
  # F-010: command builtin bypass
  - command
  # NEW-6: dangerous file operations
  - find
  - chmod
  - chown

known_safe:
  - ls
  - cat
  - head
  - tail
  - wc
  - sort
  - uniq
  - cut
  - paste
  - tr
  - tee
  - diff
  - cmp
  - comm
  - grep
  - rg
  - fd
  - fzf
  - ag
  - ack
  - sed
  - awk
  - jq
  - yq
  - date
  - cal
  - echo
  - printf
  - "true"
  - "false"
  - test
  - "["
  - basename
  - dirname
  - realpath
  - readlink
  - stat
  - file
  - which
  - type
  - whoami
  - id
  - uname
  - hostname
  - pwd
  - printenv
  - tree
  - du
  - df
  - free
  - uptime
  - less
  - more
  - xxd
  - od
  - hexdump
  - md5sum
  - sha256sum
  - base64
  - column
  - expand
  - unexpand
  - fold
  - fmt
  - nl
  - rev
  - seq
  - "yes"
  # Dev tools
  - git
  - gh
  - make
  - cargo
  - gcc
  - g++
  - cc
  - c++
  - go
  - rustc
  - javac
  - java
  - docker
  - kubectl
  - npx
  - yarn
  - pnpm

known_safe_extra: []

subcommand_rules:
  git:
    allow:
      - status
      - log
      - diff
      - show
      - branch
      - tag
      - remote
      - stash
      - describe
      - shortlog
      - blame
      - bisect
      - reflog
      - rev-parse
      - rev-list
      - ls-files
      - ls-tree
      - ls-remote
      - cat-file
      - for-each-ref
      - name-rev
      - config
      - var
      - help
      - version
      - count-objects
      - fsck
      - verify-pack
      - notes
      - grep
      - whatchanged
      - add
      - commit
      - fetch
      - clone
      - init
      - mv
      - rm
      - switch
      - worktree
      - cherry-pick
      - apply
      - am
      - submodule
      - sparse-checkout
      - archive
      - bundle
    ask:
      - push
      - pull
      - merge
      - rebase
      - reset
      - "checkout:."
      - "restore:."
      - clean
      - "stash:drop"
      - "stash:clear"
      - "branch:-D"
      - "tag:-d"
      - filter-branch
      - gc
    default_action: ask
  docker:
    allow:
      - ps
      - images
      - logs
      - inspect
      - info
      - version
      - stats
      - top
      - port
      - diff
      - history
      - "network:ls"
      - "network:inspect"
      - "volume:ls"
      - "volume:inspect"
      - "compose:ps"
      - "compose:logs"
      - "compose:config"
    ask:
      - run
      - exec
      - rm
      - rmi
      - stop
      - kill
      - build
      - push
      - pull
      - "system:prune"
      - "compose:up"
      - "compose:down"
      - "compose:build"
    default_action: ask
  gh:
    allow:
      - "pr:list"
      - "pr:view"
      - "pr:status"
      - "pr:checks"
      - "pr:diff"
      - "issue:list"
      - "issue:view"
      - "issue:status"
      - "repo:list"
      - "repo:view"
      - "run:list"
      - "run:view"
      - "release:list"
      - "release:view"
      - api
      - "auth:status"
      - status
    ask:
      - "pr:merge"
      - "pr:close"
      - "pr:reopen"
      - "issue:close"
      - "issue:delete"
      - "repo:delete"
      - "repo:archive"
      - "release:delete"
      - "release:create"
      - "run:cancel"
    default_action: ask

# Legacy: subcommand_ask (backward compat, evaluated if no subcommand_rules match)
subcommand_ask:
  - git:push
  - git:clean
  - git:reset:--hard
  - git:checkout:.
  - git:restore:.
  - gh:pr:merge
  - gh:repo:delete
  - gh:repo:archive
  - gh:release:delete
  # NEW-5: destructive git operations
  - git:stash:drop
  - git:stash:clear
  - git:rebase
  - git:branch:-D
  - git:tag:-d
  - git:filter-branch

allowed_dirs_extra: []

# Audit log for all permission decisions (JSONL format)
# Default: ${CLAUDE_PLUGIN_ROOT}/logs/decisions.jsonl
# Set to empty string "" to disable logging
audit_log_path: ""
